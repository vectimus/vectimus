name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - name: Checkout canonical policies
        uses: actions/checkout@v7
        with:
          repository: vectimus/policies
          ref: main
          path: policies-canonical
      - name: Sync canonical policies into build tree
        run: |
          rsync -a --delete \
            --exclude='.git/' --exclude='.git*' \
            --exclude='scripts/' --exclude='tests/' \
            --exclude='CHANGELOG.md' --exclude='CONTRIBUTING.md' \
            --exclude='LICENSE' --exclude='README.md' \
            --exclude='SECURITY.md' --exclude='VERSION' \
            policies-canonical/ policies/
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build
      - name: Build package
        run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
