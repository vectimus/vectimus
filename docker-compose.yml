services:
  vectimus:
    build: .
    ports:
      - "8420:8420"
    environment:
      - VECTIMUS_HOST=0.0.0.0
      - VECTIMUS_PORT=8420
      # - VECTIMUS_WORKERS=2  # Note: workers > 1 disables SSE /events and session flood detection
      # - VECTIMUS_API_KEY=changeme
      # - VECTIMUS_API_KEYS=team1:key1,team2:key2
      # - VECTIMUS_CORS_ORIGINS=https://dashboard.example.com
      # --- TLS ---
      # - VECTIMUS_SSL_CERTFILE=/certs/cert.pem
      # - VECTIMUS_SSL_KEYFILE=/certs/key.pem
    volumes:
      - vectimus-logs:/home/vectimus/.vectimus/logs
      # Mount your TLS certs into the container:
      # - ./certs:/certs:ro
    restart: unless-stopped

volumes:
  vectimus-logs:
